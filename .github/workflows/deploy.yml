name: Trigger Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deployment in firehose-infra
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DEPLOY_PAT }}
          repository: XRPL-Commons/firehose-infra
          event-type: deploy-firehose-xrpl
          client-payload: >-
            {
              "ref": "${{ github.sha }}",
              "triggered_by": "${{ github.actor }}",
              "source_run_id": "${{ github.run_id }}"
            }
